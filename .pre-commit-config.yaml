repos:
  # Go formatting
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet-mod
      - id: go-mod-tidy

  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Go specific
  - repo: local
    hooks:
      - id: go-test
        name: go test
        entry: make test
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go build
        entry: make build
        language: system
        types: [go]
        pass_filenames: false